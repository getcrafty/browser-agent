<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Auth Takeover Fixture</title>
	<style>
		:root {
			font-family:
				"Iowan Old Style", "Palatino Linotype", "Book Antiqua",
				Georgia, serif;
			color: #182027;
			background:
				radial-gradient(circle at top, #e7efe9 0%, #f6f3ea 42%, #efe5d2 100%);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 32px 18px;
		}

		.shell {
			width: min(100%, 860px);
			display: grid;
			gap: 18px;
			grid-template-columns: 1.1fr 0.9fr;
		}

		.panel {
			border: 1px solid rgba(24, 32, 39, 0.14);
			border-radius: 22px;
			background: rgba(255, 250, 240, 0.92);
			box-shadow: 0 24px 60px rgba(88, 74, 45, 0.12);
			padding: 28px;
		}

		h1,
		h2,
		p {
			margin: 0;
		}

		.eyebrow {
			font-size: 12px;
			letter-spacing: 0.18em;
			text-transform: uppercase;
			color: #6a6d5f;
			margin-bottom: 12px;
		}

		.hero {
			display: grid;
			gap: 14px;
			align-content: start;
		}

		.hero p {
			line-height: 1.45;
			color: #40505d;
		}

		.card-title {
			font-size: 32px;
			line-height: 1.05;
		}

		form {
			display: grid;
			gap: 14px;
		}

		label {
			display: grid;
			gap: 6px;
			font-size: 14px;
			color: #33414d;
		}

		.field {
			display: grid;
			gap: 6px;
			font-size: 14px;
			color: #33414d;
		}

		input,
		button {
			font: inherit;
		}

		input {
			width: 100%;
			padding: 12px 14px;
			border-radius: 14px;
			border: 1px solid rgba(24, 32, 39, 0.18);
			background: rgba(255, 255, 255, 0.96);
		}

		button {
			border: 0;
			border-radius: 999px;
			padding: 12px 18px;
			background: linear-gradient(135deg, #264653 0%, #1d3557 100%);
			color: #fff8ee;
			cursor: pointer;
		}

		.status {
			min-height: 24px;
			font-size: 15px;
			color: #5b3a16;
		}

		.status[data-state="error"] {
			color: #9f2d22;
			font-weight: 600;
		}

		.hidden {
			display: none;
		}

		.marker {
			margin-top: 18px;
			padding: 16px 18px;
			border-radius: 16px;
			background: rgba(31, 110, 92, 0.08);
			color: #1e564a;
		}

		.marker[data-kind="otp"] {
			background: rgba(158, 79, 39, 0.1);
			color: #7f3d1e;
		}

		@media (max-width: 720px) {
			.shell {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>

<body>
	<div class="shell">
		<section class="panel hero">
			<p class="eyebrow">Fixture Portal</p>
			<h1 class="card-title">Secure Sign-In Demo</h1>

			<div class="marker" id="scenario-banner">
				Scenario banner loading...
			</div>
		</section>

		<section class="panel">
			<div id="login-shell">
				<p class="eyebrow">Account Access</p>
				<h2>Sign in to continue</h2>
				<form id="login-form">
					<div id="form-fields"></div>
					<p id="step-copy" class="status" data-state="idle">
						Enter your account credentials.
					</p>
					<button id="login-submit" data-bid="3" type="submit">
						Sign in
					</button>
					<div class="status" id="auth-status" aria-live="polite" data-state="idle">
						Enter your account credentials.
					</div>
				</form>
			</div>

			<main id="app-shell" class="hidden"></main>

			<section id="otp-shell" class="hidden"></section>
		</section>
	</div>

	<script src="./auth-takeover-fixture.js"></script>
</body>

</html>
